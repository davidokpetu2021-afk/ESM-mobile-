<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESM - Players</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h2>Players</h2>
  </header>

  <!-- CREATE PLAYER -->
  <section id="createPlayerSection">

    <h3>Add Player</h3>

    <input type="text" id="playerName" placeholder="Player Name">

    <input type="file" id="playerPhoto">

    <!-- Team selector -->
    <select id="playerTeam"></select>

    <button onclick="createPlayer()">Add Player</button>

  </section>


  <!-- PLAYER LIST -->
  <section id="playerList">

    <h3>Players</h3>

    <div id="playersContainer"></div>

  </section>


  <!-- SCRIPTS -->
  <script src="db.js"></script>
  <script src="app.js"></script>


  <!-- PLAYER LOGIC -->
  <script>

    // -----------------------------
    // LOAD TEAMS INTO DROPDOWN
    // -----------------------------
    async function loadTeamOptions() {

      const select = document.getElementById("playerTeam");

      select.innerHTML = "";

      const teams = await getAllRecords("teams");

      teams.forEach(t => {

        const option = document.createElement("option");

        option.value = t.id;
        option.textContent = t.name;

        select.appendChild(option);

      });

    }


    // -----------------------------
    // CREATE PLAYER
    // -----------------------------
    async function createPlayer() {

      const name = document.getElementById("playerName").value;
      const teamId = document.getElementById("playerTeam").value;
      const photoInput = document.getElementById("playerPhoto");

      if (!name || !teamId) {
        alert("Player name and team required");
        return;
      }

      let photo = null;

      if (photoInput.files.length > 0) {
        photo = await fileToBase64(photoInput.files[0]);
      }

      const player = {
        id: Date.now().toString(),
        name,
        teamId,
        photo,

        // -----------------------------
        // STATS SYSTEM (CORE ENGINE)
        // -----------------------------
        goals: 0,
        assists: 0,
        yellowCards: 0,
        redCards: 0,
        cleanSheets: 0, // Goalkeepers only

        createdAt: new Date().toISOString()
      };

      await addRecord("players", player);

      clearPlayerForm();
      loadPlayersUI();

      alert("Player Added");

    }


    // -----------------------------
    // LOAD PLAYERS
    // -----------------------------
    async function loadPlayersUI() {

      const container = document.getElementById("playersContainer");

      container.innerHTML = "";

      const players = await getAllRecords("players");

      players.forEach(p => {

        const card = document.createElement("div");
        card.className = "player-card";

        card.innerHTML = `

          <div class="card-header">
            ${p.photo ? `<img src="${p.photo}" width="50">` : ""}
            <h4>${p.name}</h4>
          </div>

          <p>Team ID: ${p.teamId}</p>

          <p>Goals: ${p.goals}</p>
          <p>Assists: ${p.assists}</p>
          <p>Yellow Cards: ${p.yellowCards}</p>
          <p>Red Cards: ${p.redCards}</p>
          <p>Clean Sheets: ${p.cleanSheets}</p>

          <button onclick="deletePlayer('${p.id}')">Delete</button>

        `;

        container.appendChild(card);

      });

    }


    // -----------------------------
    // DELETE PLAYER
    // -----------------------------
    async function deletePlayer(id) {

      if (!confirm("Delete this player?")) return;

      await deleteRecord("players", id);

      loadPlayersUI();

    }


    // -----------------------------
    // FILE CONVERTER
    // -----------------------------
    function fileToBase64(file) {

      return new Promise((resolve, reject) => {

        const reader = new FileReader();

        reader.onload = () => resolve(reader.result);
        reader.onerror = err => reject(err);

        reader.readAsDataURL(file);

      });

    }


    // -----------------------------
    // CLEAR FORM
    // -----------------------------
    function clearPlayerForm() {

      document.getElementById("playerName").value = "";
      document.getElementById("playerPhoto").value = "";

    }


    // -----------------------------
    // INITIAL LOAD
    // -----------------------------
    document.addEventListener("DOMContentLoaded", async () => {

      await initDB();

      await loadTeamOptions();

      loadPlayersUI();

    });

  </script>

</body>

  </html>
